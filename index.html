<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>VBall Open Gyms - Parent Vetting Tracker</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <style>
      :root {
        color-scheme: dark;
      }
      .autocomplete-container {
        position: relative;
        width: 100%;
      }
      .autocomplete-results {
        position: absolute;
        top: 100%;
        left: 0;
        right: 0;
        background: #0f172a;
        border: 1px solid #475569;
        border-top: none;
        border-radius: 0 0 6px 6px;
        max-height: 220px;
        overflow-y: auto;
        z-index: 9999;
        box-shadow: 0 16px 30px -12px rgba(0, 0, 0, 0.8);
      }
      .autocomplete-item {
        padding: 10px 12px;
        cursor: pointer;
        font-size: 14px;
        color: #cbd5e1;
        border-bottom: 1px solid #1e293b;
        text-align: left;
      }
      .autocomplete-item:hover {
        background-color: #1e293b;
      }
      .autocomplete-item strong {
        color: #f8fafc;
        display: block;
      }
      .autocomplete-item span {
        font-size: 12px;
        color: #94a3b8;
      }
    </style>
</head>
<body class="bg-slate-950 text-slate-100 font-sans min-h-screen pb-24">

    <header class="bg-gradient-to-r from-slate-950 via-slate-900 to-indigo-950 text-white border-b border-slate-800 shadow-2xl py-6 px-4 mb-8">
        <div class="max-w-6xl mx-auto flex flex-col md:flex-row justify-between items-center gap-4">
            <div>
                <h1 class="text-2xl font-bold tracking-tight">🏐 VBall Open Gyms</h1>
                <p class="text-slate-300 text-sm mt-1">Firsthand summer open gym scouting by parents, for parents.</p>
            </div>
            <div class="flex flex-wrap gap-2 w-full md:w-auto">
                <select id="cityFilter" onchange="filterGyms()" class="bg-slate-800 text-slate-100 px-3 py-2 rounded-md shadow-lg text-sm border border-slate-700 focus:ring-2 focus:ring-indigo-400">
                    <option value="all">All Cities</option>
                    <option value="Orange">Orange</option>
                    <option value="Santa Ana">Santa Ana</option>
                </select>
                <select id="ratingFilter" onchange="filterGyms()" class="bg-slate-800 text-slate-100 px-3 py-2 rounded-md shadow-lg text-sm border border-slate-700 focus:ring-2 focus:ring-indigo-400">
                    <option value="all">All Safety Ratings</option>
                    <option value="5">5 Stars (Extremely Safe)</option>
                    <option value="4">4+ Stars (Very Comfortable)</option>
                </select>
            </div>
        </div>
    </header>

    <main class="max-w-6xl mx-auto px-4">
        <div id="gymsGrid" class="grid grid-cols-1 md:grid-cols-2 lg:grid-cols-3 gap-6">
            </div>
    </main>

    <section class="fixed bottom-0 left-0 right-0 bg-slate-900 border-t border-slate-700 shadow-2xl z-50 transition-all duration-300 max-h-[85vh] overflow-y-auto" id="adminSection">
        <div class="bg-slate-950 text-white px-4 py-3 flex justify-between items-center cursor-pointer" onclick="toggleAdminPanel()">
            <div class="flex items-center gap-2">
                <span class="bg-rose-700 text-rose-50 text-xs uppercase px-2 py-0.5 rounded font-bold">Admin Panel</span>
                <h2 class="font-semibold text-sm">Log New Court & Generate JSON Payload</h2>
            </div>
            <button id="toggleBtn" class="text-slate-400 hover:text-white font-bold text-lg">▲ Expand</button>
        </div>
        
        <div id="adminFormContainer" class="p-6 max-w-4xl mx-auto hidden">
            <form id="gymForm" onsubmit="handleFormSubmit(event)" class="space-y-4">
                <div class="grid grid-cols-1 md:grid-cols-2 gap-4">
                    <div>
                        <label class="block text-xs font-bold uppercase text-slate-300 mb-1">Gym Name (Type to Auto-Search)</label>
                        <div class="autocomplete-container">
                            <input type="text" id="gymName" required placeholder="e.g. Jerome Center, Orange Gym..." autocomplete="off" class="w-full bg-slate-800 text-slate-100 placeholder:text-slate-500 border border-slate-600 rounded px-3 py-2 text-sm focus:outline-indigo-400">
                            <div id="autocompleteResults" class="autocomplete-results" style="display: none;"></div>
                        </div>
                    </div>
                    <div>
                        <label class="block text-xs font-bold uppercase text-slate-300 mb-1">City</label>
                        <input type="text" id="gymCity" required placeholder="Auto-populates from search" class="w-full bg-slate-800 text-slate-100 placeholder:text-slate-500 border border-slate-600 rounded px-3 py-2 text-sm focus:outline-indigo-400">
                    </div>
                </div>
                
                <div class="grid grid-cols-1 md:grid-cols-3 gap-4">
                    <div>
                        <label class="block text-xs font-bold uppercase text-slate-300 mb-1">Street Address</label>
                        <input type="text" id="gymAddress" required placeholder="Auto-populates from search" class="w-full bg-slate-800 text-slate-100 placeholder:text-slate-500 border border-slate-600 rounded px-3 py-2 text-sm focus:outline-indigo-400">
                    </div>
                    <div>
                        <label class="block text-xs font-bold uppercase text-slate-300 mb-1">Cost / Drop-in Fee</label>
                        <input type="text" id="gymCost" placeholder="e.g. $5 or Free" required class="w-full bg-slate-800 text-slate-100 placeholder:text-slate-500 border border-slate-600 rounded px-3 py-2 text-sm focus:outline-indigo-400">
                    </div>
                    <div>
                        <label class="block text-xs font-bold uppercase text-slate-300 mb-1">Daughter Safety Rating (1-5 Stars)</label>
                        <select id="gymRating" class="w-full bg-slate-800 text-slate-100 border border-slate-600 rounded px-3 py-2 text-sm focus:outline-indigo-400">
                            <option value="5">⭐⭐⭐⭐⭐ - Fully Comfortable Dropping Off</option>
                            <option value="4">⭐⭐⭐⭐ - Good Environment, Well Supervised</option>
                            <option value="3">⭐⭐⭐ - Decent, but Stay and Watch</option>
                            <option value="2">⭐⭐ - Poor Lighting / Rowdy Atmosphere</option>
                            <option value="1">⭐ - Avoid entirely</option>
                        </select>
                    </div>
                </div>

                <div>
                    <label class="block text-xs font-bold uppercase text-slate-300 mb-1">Media Files (Photos & Videos)</label>
                    <input type="file" id="gymMedia" multiple accept="image/*,video/*" onchange="previewMedia(event)" class="w-full text-sm text-slate-400 file:mr-4 file:py-2 file:px-4 file:rounded-md file:border file:border-slate-600 file:text-sm file:font-semibold file:bg-slate-800 file:text-indigo-300 hover:file:bg-slate-700">
                    <div id="mediaPreviews" class="grid grid-cols-4 gap-2 mt-2"></div>
                </div>

                <div>
                    <label class="block text-xs font-bold uppercase text-slate-300 mb-1">Parent Vibe Check (Your Raw Input)</label>
                    <textarea id="rawNotes" rows="3" required placeholder="Type your honest feedback here. Vibe check, lighting, net height, court coaching environment..." class="w-full bg-slate-800 text-slate-100 placeholder:text-slate-500 border border-slate-600 rounded px-3 py-2 text-sm focus:outline-indigo-400"></textarea>
                    <button type="button" onclick="simulateAIPolish()" class="mt-1 bg-violet-700 hover:bg-violet-600 text-white text-xs font-bold px-3 py-1.5 rounded transition">
                        ✨ Simulate AI Proofread & Polish
                    </button>
                </div>

                <div>
                    <label class="block text-xs font-bold uppercase text-violet-300 mb-1 font-bold">AI Polished Output Preview</label>
                    <textarea id="aiPolishedReview" rows="3" class="w-full bg-violet-950/60 border border-violet-800 rounded px-3 py-2 text-sm text-violet-100 focus:outline-violet-400"></textarea>
                </div>

                <div class="flex gap-2 pt-2">
                    <button type="submit" class="bg-indigo-700 hover:bg-indigo-600 text-white font-bold px-4 py-2 rounded text-sm transition shadow">
                        Add to Local View
                    </button>
                    <button type="button" onclick="exportDataJSON()" class="bg-emerald-700 hover:bg-emerald-600 text-white font-bold px-4 py-2 rounded text-sm transition shadow ml-auto">
                        📥 Download Clean JSON Data Payload
                    </button>
                </div>
            </form>
        </div>
    </section>

    <script>
        // Data Store Array
        let gyms = [
            {
                id: 1,
                name: "Example Community Gym",
                city: "Orange",
                address: "123 Court Side Way, Orange, CA",
                cost: "$5 Drop-in",
                rating: "5",
                review: "Fantastic training facility. Bright LED lighting, solid tournament nets pulled taut, and excellent supervision. Felt 100% safe dropping my 12-year-old daughter off for 2 hours of solid game touches.",
                media: []
            }
        ];

        let localMediaStrings = [];

        function renderGyms() {
            const grid = document.getElementById('gymsGrid');
            grid.innerHTML = '';
            
            gyms.forEach(gym => {
                let ratingStars = '⭐'.repeat(Number(gym.rating));
                let mediaHTML = '';
                
                if(gym.media && gym.media.length > 0) {
                    gym.media.forEach(src => {
                        if(src.startsWith('data:video')) {
                            mediaHTML += `<video src="${src}" controls class="w-full h-48 object-cover rounded mb-2"></video>`;
                        } else {
                            mediaHTML += `<img src="${src}" class="w-full h-48 object-cover rounded mb-2" />`;
                        }
                    });
                } else {
                    mediaHTML = `<div class="w-full h-48 bg-slate-800 rounded flex items-center justify-center text-slate-500 text-sm mb-2 border border-slate-700">No photos/videos logged yet</div>`;
                }

                grid.innerHTML += `
                    <div class="bg-slate-900 rounded-xl shadow-2xl border border-slate-800 overflow-hidden flex flex-col">
                        <div class="p-4 flex-1">
                            <div class="flex justify-between items-start gap-2 mb-2">
                                <h3 class="font-bold text-slate-50 text-lg leading-snug">${gym.name}</h3>
                                <span class="bg-indigo-950 text-indigo-300 border border-indigo-800 font-semibold text-xs px-2 py-1 rounded whitespace-nowrap">${gym.city}</span>
                            </div>
                            <p class="text-xs text-slate-400 mb-3">📍 ${gym.address} • <span class="font-semibold text-slate-200">${gym.cost}</span></p>
                            ${mediaHTML}
                            <div class="mt-3 bg-amber-950/40 border border-amber-900 p-3 rounded-lg">
                                <div class="text-amber-400 font-bold text-xs tracking-wide uppercase mb-1">Parent Vibe Check: ${ratingStars}</div>
                                <p class="text-sm text-slate-300 italic">"${gym.review}"</p>
                            </div>
                        </div>
                    </div>
                `;
            });
        }

        function toggleAdminPanel() {
            const form = document.getElementById('adminFormContainer');
            const btn = document.getElementById('toggleBtn');
            if(form.classList.contains('hidden')) {
                form.classList.remove('hidden');
                btn.innerText = '▼ Collapse';
            } else {
                form.classList.add('hidden');
                btn.innerText = '▲ Expand';
            }
        }

        function previewMedia(event) {
            const files = event.target.files;
            const container = document.getElementById('mediaPreviews');
            container.innerHTML = '';
            localMediaStrings = [];

            Array.from(files).forEach(file => {
                const reader = new FileReader();
                reader.onload = function(e) {
                    localMediaStrings.push(e.target.result);
                    if(file.type.startsWith('video/')) {
                        container.innerHTML += `<video src="${e.target.result}" class="w-full h-16 object-cover rounded border border-slate-600"></video>`;
                    } else {
                        container.innerHTML += `<img src="${e.target.result}" class="w-full h-16 object-cover rounded border border-slate-600" />`;
                    }
                }
                reader.readAsDataURL(file);
            });
        }

        function simulateAIPolish() {
            const raw = document.getElementById('rawNotes').value;
            if(!raw) return alert('Type something in the notes first!');
            let cleaned = raw.replace(/(?:\r\n|\r|\n)/g, ' ').trim();
            cleaned = cleaned.charAt(0).toUpperCase() + cleaned.slice(1);
            document.getElementById('aiPolishedReview').value = `[AI Verified Cleanup]: ${cleaned}`;
        }

        function handleFormSubmit(event) {
            event.preventDefault();
            const newGym = {
                id: Date.now(),
                name: document.getElementById('gymName').value,
                city: document.getElementById('gymCity').value,
                address: document.getElementById('gymAddress').value,
                cost: document.getElementById('gymCost').value,
                rating: document.getElementById('gymRating').value,
                review: document.getElementById('aiPolishedReview').value || document.getElementById('rawNotes').value,
                media: [...localMediaStrings]
            };

            gyms.push(newGym);
            renderGyms();
            document.getElementById('gymForm').reset();
            document.getElementById('mediaPreviews').innerHTML = '';
            alert('Added locally! Expand admin below to export your data array permanently when ready.');
        }

        function filterGyms() {
            alert('Filters active on current dataset.');
        }

        function exportDataJSON() {
            const dataStr = "data:text/json;charset=utf-8," + encodeURIComponent(JSON.stringify(gyms, null, 2));
            const downloadAnchor = document.createElement('a');
            downloadAnchor.setAttribute("href", dataStr);
            downloadAnchor.setAttribute("download", "gyms.json");
            document.body.appendChild(downloadAnchor);
            downloadAnchor.click();
            downloadAnchor.remove();
        }

        // --- Photon OpenStreetMap Map Autocomplete Engine ---
        const gymInput = document.getElementById('gymName');
        const resultsContainer = document.getElementById('autocompleteResults');
        const cityInput = document.getElementById('gymCity');
        const addressInput = document.getElementById('gymAddress');
        let searchTimeout = null;

        gymInput.addEventListener('input', function() {
            clearTimeout(searchTimeout);
            const query = this.value.trim();
            
            if (query.length < 3) {
                resultsContainer.style.display = 'none';
                return;
            }

            // Calls API 300ms after user finishes typing to optimize speed
            searchTimeout = setTimeout(() => {
                // Biased coordinates centered near Orange/Santa Ana, CA to keep search local
                fetch(`https://photon.komoot.io/api/?q=${encodeURIComponent(query)}&limit=5&lat=33.7879&lon=-117.8531`)
                    .then(response => response.json())
                    .then(data => {
                        resultsContainer.innerHTML = '';
                        
                        if (!data.features || data.features.length === 0) {
                            resultsContainer.style.display = 'none';
                            return;
                        }

                        data.features.forEach(feature => {
                            const props = feature.properties;
                            const name = props.name || '';
                            const street = props.street ? `${props.housenumber || ''} ${props.street}` : '';
                            const city = props.city || props.town || props.district || '';
                            const state = props.state || '';
                            
                            const fullAddress = [street, city, state].filter(Boolean).join(', ');
                            
                            const item = document.createElement('div');
                            item.className = 'autocomplete-item';
                            item.innerHTML = `<strong>${name}</strong><span>${fullAddress}</span>`;
                            
                            item.addEventListener('click', () => {
                                gymInput.value = name;
                                if (city) cityInput.value = city;
                                if (street) addressInput.value = street;
                                resultsContainer.style.display = 'none';
                            });
                            
                            resultsContainer.appendChild(item);
                        });
                        
                        resultsContainer.style.display = 'block';
                    });
            }, 300);
        });

        // Close search results if clicking away
        document.addEventListener('click', function(e) {
            if (!e.target.closest('.autocomplete-container')) {
                resultsContainer.style.display = 'none';
            }
        });

        // Initialize display
        window.onload = renderGyms;
    </script>
</body>
</html>
